<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Ishu</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

:root {
–pink:     #f2c4ce;
–lavender: #d9c8e8;
–peach:    #f7ddd0;
–cream:    #fdf6f0;
–text:     #5c3d4a;
–muted:    #9b7585;
}

body {
background: #fdf0f4;
min-height: 100vh;
font-family: ‘DM Sans’, sans-serif;
overflow-x: hidden;
cursor: none;
}

/* Cursor */
.cursor {
width: 12px; height: 12px;
background: var(–pink);
border-radius: 50%;
position: fixed;
pointer-events: none;
z-index: 9999;
transform: translate(-50%, -50%);
transition: transform 0.08s ease;
mix-blend-mode: multiply;
}
.cursor-ring {
width: 36px; height: 36px;
border: 1.5px solid var(–lavender);
border-radius: 50%;
position: fixed;
pointer-events: none;
z-index: 9998;
transform: translate(-50%, -50%);
transition: left 0.12s ease, top 0.12s ease;
opacity: 0.7;
}

/* Soft mesh background */
.bg {
position: fixed; inset: 0;
background:
radial-gradient(ellipse 60% 50% at 20% 20%, rgba(242,196,206,0.35) 0%, transparent 70%),
radial-gradient(ellipse 50% 60% at 80% 80%, rgba(217,200,232,0.3) 0%, transparent 70%),
radial-gradient(ellipse 40% 40% at 60% 20%, rgba(247,221,208,0.25) 0%, transparent 70%),
#fdf0f4;
z-index: 0;
}

/* Soft floating blobs */
.blob {
position: fixed;
border-radius: 50%;
filter: blur(60px);
opacity: 0.18;
pointer-events: none;
animation: blobDrift ease-in-out infinite alternate;
z-index: 0;
}
@keyframes blobDrift {
from { transform: translate(0, 0) scale(1); }
to   { transform: translate(30px, -20px) scale(1.08); }
}

/* Scene */
.scene {
position: relative;
z-index: 1;
min-height: 100vh;
display: flex;
align-items: center;
justify-content: center;
padding: 60px 24px;
}

/* Card */
.card-wrap { perspective: 1200px; }

.card {
width: min(400px, 92vw);
background: rgba(255, 248, 245, 0.82);
backdrop-filter: blur(24px);
-webkit-backdrop-filter: blur(24px);
border-radius: 28px;
padding: 56px 44px 48px;
border: 1px solid rgba(242, 196, 206, 0.45);
box-shadow:
0 2px 0 rgba(255,255,255,0.9) inset,
0 24px 64px rgba(220, 150, 170, 0.15),
0 8px 24px rgba(217, 200, 232, 0.2);
transform-style: preserve-3d;
transition: transform 0.12s ease, box-shadow 0.3s ease;
animation: fadeUp 1.1s cubic-bezier(0.34, 1.4, 0.64, 1) both;
text-align: center;
}

@keyframes fadeUp {
from { opacity: 0; transform: translateY(50px) rotateX(-10deg) scale(0.95); }
to   { opacity: 1; transform: translateY(0) rotateX(0deg) scale(1); }
}

/* Decoration line top */
.card::before {
content: ‘’;
position: absolute;
top: 0; left: 50%;
transform: translateX(-50%);
width: 60px; height: 3px;
background: linear-gradient(90deg, var(–pink), var(–lavender));
border-radius: 0 0 4px 4px;
}

/* Small petal ornament */
.ornament {
display: flex;
justify-content: center;
gap: 6px;
margin-bottom: 28px;
opacity: 0.5;
}
.ornament span {
width: 5px; height: 5px;
border-radius: 50%;
background: var(–pink);
display: inline-block;
}
.ornament span:nth-child(2) { background: var(–lavender); width: 7px; height: 7px; margin-top: -1px; }
.ornament span:nth-child(3) { background: var(–peach); }

/* Name */
.name {
font-family: ‘Cormorant Garamond’, serif;
font-size: clamp(52px, 14vw, 72px);
font-weight: 600;
font-style: italic;
background: linear-gradient(135deg, #d4788a 0%, #b57ab8 60%, #d4788a 100%);
background-size: 200% auto;
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
background-clip: text;
line-height: 1;
margin-bottom: 6px;
animation: nameShimmer 4s ease-in-out infinite;
}
@keyframes nameShimmer {
0%, 100% { background-position: 0% center; }
50%       { background-position: 100% center; }
}

.tagline {
font-size: 11px;
letter-spacing: 4px;
text-transform: uppercase;
color: var(–muted);
font-weight: 400;
margin-bottom: 36px;
opacity: 0.8;
}

/* Soft rule */
.rule {
display: flex;
align-items: center;
gap: 12px;
margin-bottom: 36px;
}
.rule::before, .rule::after {
content: ‘’;
flex: 1;
height: 1px;
background: linear-gradient(90deg, transparent, rgba(217,200,232,0.6), transparent);
}
.rule-dot {
width: 5px; height: 5px;
border-radius: 50%;
background: var(–lavender);
flex-shrink: 0;
}

/* Message */
.sorry {
font-family: ‘Cormorant Garamond’, serif;
font-size: 28px;
font-style: italic;
color: var(–text);
margin-bottom: 20px;
font-weight: 400;
}

.message {
font-size: 14.5px;
line-height: 2;
color: var(–muted);
font-weight: 300;
max-width: 300px;
margin: 0 auto 36px;
letter-spacing: 0.2px;
}

.message em {
font-style: italic;
font-family: ‘Cormorant Garamond’, serif;
font-size: 17px;
color: #b06a80;
display: block;
margin-top: 12px;
font-weight: 400;
}

/* Button */
.btn {
display: inline-block;
padding: 14px 44px;
background: transparent;
color: var(–text);
font-family: ‘DM Sans’, sans-serif;
font-weight: 400;
font-size: 13px;
letter-spacing: 2px;
text-transform: uppercase;
border: 1.5px solid rgba(217, 200, 232, 0.8);
border-radius: 999px;
cursor: pointer;
transition: all 0.35s cubic-bezier(0.34, 1.4, 0.64, 1);
position: relative;
overflow: hidden;
background: rgba(255,255,255,0.5);
}

.btn::before {
content: ‘’;
position: absolute; inset: 0;
background: linear-gradient(135deg, rgba(242,196,206,0.4), rgba(217,200,232,0.4));
opacity: 0;
transition: opacity 0.3s;
border-radius: inherit;
}
.btn:hover { transform: translateY(-3px); border-color: var(–pink); box-shadow: 0 12px 32px rgba(220,150,170,0.2); }
.btn:hover::before { opacity: 1; }
.btn:active { transform: scale(0.97); }

/* Floating petals */
.petal {
position: fixed;
pointer-events: none;
z-index: 0;
animation: petalFall linear infinite;
opacity: 0;
font-size: 14px;
filter: blur(0.3px);
}
@keyframes petalFall {
0%   { transform: translateY(-40px) rotate(0deg) translateX(0); opacity: 0; }
10%  { opacity: 0.5; }
90%  { opacity: 0.4; }
100% { transform: translateY(110vh) rotate(360deg) translateX(60px); opacity: 0; }
}

/* Sparkle trail */
.sparkle {
position: fixed;
pointer-events: none;
z-index: 9997;
width: 5px; height: 5px;
border-radius: 50%;
animation: sparkleFade 0.7s ease-out forwards;
}
@keyframes sparkleFade {
0%   { transform: scale(1) translateY(0); opacity: 0.9; }
100% { transform: scale(0) translateY(-20px); opacity: 0; }
}

/* Popup */
.overlay {
position: fixed; inset: 0;
background: rgba(253, 240, 244, 0.5);
backdrop-filter: blur(8px);
z-index: 9989;
opacity: 0; pointer-events: none;
transition: opacity 0.4s;
}
.overlay.show { opacity: 1; pointer-events: all; }

.popup {
position: fixed;
top: 50%; left: 50%;
transform: translate(-50%, -50%) scale(0.85);
background: rgba(255, 250, 247, 0.96);
backdrop-filter: blur(30px);
border-radius: 24px;
padding: 50px 40px 44px;
text-align: center;
z-index: 9990;
box-shadow: 0 32px 80px rgba(200, 130, 155, 0.2), 0 1px 0 rgba(255,255,255,0.9) inset;
border: 1px solid rgba(242, 196, 206, 0.4);
max-width: 320px; width: 90%;
opacity: 0;
transition: all 0.5s cubic-bezier(0.34, 1.4, 0.64, 1);
}
.popup::before {
content: ‘’;
position: absolute;
top: 0; left: 50%;
transform: translateX(-50%);
width: 40px; height: 2px;
background: linear-gradient(90deg, var(–pink), var(–lavender));
border-radius: 0 0 3px 3px;
}
.popup.show { transform: translate(-50%, -50%) scale(1); opacity: 1; }

.popup-name {
font-family: ‘Cormorant Garamond’, serif;
font-size: 36px;
font-style: italic;
color: #c06878;
margin-bottom: 16px;
}
.popup-text {
font-size: 14px;
line-height: 1.9;
color: var(–muted);
font-weight: 300;
margin-bottom: 28px;
}
.popup-text em {
font-style: italic;
font-family: ‘Cormorant Garamond’, serif;
font-size: 16px;
color: #b06a80;
}
.close-btn {
padding: 11px 32px;
background: transparent;
border: 1.5px solid rgba(217,200,232,0.8);
border-radius: 999px;
font-family: ‘DM Sans’, sans-serif;
font-size: 12px;
letter-spacing: 2px;
text-transform: uppercase;
color: var(–text);
cursor: pointer;
transition: all 0.3s;
background: rgba(255,255,255,0.6);
}
.close-btn:hover { border-color: var(–pink); transform: translateY(-2px); }

/* Soft confetti */
.conf {
position: fixed;
pointer-events: none;
z-index: 9998;
border-radius: 50%;
animation: confDrift 1.8s ease-out forwards;
}
@keyframes confDrift {
0%   { transform: translate(0,0) scale(1); opacity: 0.9; }
100% { transform: translate(var(–tx), var(–ty)) scale(0.2); opacity: 0; }
}
</style>

</head>
<body>

<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>
<div class="bg"></div>

<!-- Blobs -->

<div class="blob" style="width:400px;height:400px;background:#f2c4ce;top:-10%;left:-10%;animation-duration:8s;"></div>
<div class="blob" style="width:350px;height:350px;background:#d9c8e8;bottom:-5%;right:-5%;animation-duration:10s;animation-delay:2s;"></div>
<div class="blob" style="width:250px;height:250px;background:#f7ddd0;top:40%;right:10%;animation-duration:7s;animation-delay:1s;"></div>

<div class="scene">
  <div class="card-wrap" id="cardWrap">
    <div class="card" id="card">
      <div class="ornament">
        <span></span><span></span><span></span>
      </div>

```
  <div class="name">Ishu</div>
  <div class="tagline">my person &nbsp;·&nbsp; always</div>

  <div class="rule"><div class="rule-dot"></div></div>

  <div class="sorry">I'm truly sorry.</div>

  <p class="message">
    I know I hurt you, and I hate
    that I did. You deserve so much
    more than that.
    <em>I'll take care of everything.</em>
  </p>

  <button class="btn" onclick="handleForgive()">forgive me</button>

```

  </div>
</div>

<div class="overlay" id="overlay" onclick="closePopup()"></div>
<div class="popup" id="popup">
  <div class="popup-name">Thank you</div>
  <p class="popup-text">
    You mean the world to me, Ishu.<br>
    I won't let you down again.<br><br>
    <em>Promise.</em>
  </p>
  <button class="close-btn" onclick="closePopup()">close</button>
</div>

<script>
  // Cursor
  const cursor     = document.getElementById('cursor');
  const cursorRing = document.getElementById('cursorRing');
  let mx = 0, my = 0;
  document.addEventListener('mousemove', e => {
    mx = e.clientX; my = e.clientY;
    cursor.style.left = mx + 'px';
    cursor.style.top  = my + 'px';
    cursorRing.style.left = mx + 'px';
    cursorRing.style.top  = my + 'px';
  });

  // Subtle sparkle trail
  const trailColors = ['#f2c4ce','#d9c8e8','#f7ddd0','#e8c8d8'];
  let lastT = 0;
  document.addEventListener('mousemove', e => {
    const now = Date.now();
    if (now - lastT < 60) return;
    lastT = now;
    const s = document.createElement('div');
    s.className = 'sparkle';
    s.style.left = e.clientX + 'px';
    s.style.top  = e.clientY + 'px';
    s.style.background = trailColors[Math.floor(Math.random() * trailColors.length)];
    s.style.width  = (3 + Math.random() * 5) + 'px';
    s.style.height = s.style.width;
    document.body.appendChild(s);
    setTimeout(() => s.remove(), 700);
  });

  // 3D tilt
  const card = document.getElementById('card');
  const wrap = document.getElementById('cardWrap');
  wrap.addEventListener('mousemove', e => {
    const r = card.getBoundingClientRect();
    const x = (e.clientY - r.top  - r.height/2) / r.height * -14;
    const y = (e.clientX - r.left - r.width /2) / r.width  *  14;
    card.style.transform = `rotateX(${x}deg) rotateY(${y}deg) scale(1.02)`;
    card.style.boxShadow = `${-y*1.5}px ${x*1.5 + 24}px 64px rgba(220,150,170,0.2), 0 8px 24px rgba(217,200,232,0.2)`;
  });
  wrap.addEventListener('mouseleave', () => {
    card.style.transition = 'transform 0.6s cubic-bezier(0.34,1.4,0.64,1), box-shadow 0.3s';
    card.style.transform  = 'rotateX(0deg) rotateY(0deg) scale(1)';
    card.style.boxShadow  = '';
    setTimeout(() => card.style.transition = 'transform 0.12s ease, box-shadow 0.3s ease', 600);
  });

  // Touch tilt
  wrap.addEventListener('touchmove', e => {
    const t = e.touches[0];
    const r = card.getBoundingClientRect();
    const x = (t.clientY - r.top  - r.height/2) / r.height * -12;
    const y = (t.clientX - r.left - r.width /2) / r.width  *  12;
    card.style.transform = `rotateX(${x}deg) rotateY(${y}deg)`;
  }, {passive:true});
  wrap.addEventListener('touchend', () => {
    card.style.transform = 'rotateX(0deg) rotateY(0deg)';
  });

  // Falling petals (subtle, not emoji — CSS circles)
  for (let i = 0; i < 12; i++) {
    const p = document.createElement('div');
    p.className = 'petal';
    const size = 6 + Math.random() * 8;
    const colors = ['#f2c4ce','#d9c8e8','#f7ddd0','#e8d0d8'];
    p.style.cssText = `
      width:${size}px; height:${size * 1.3}px;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      border-radius: 50% 0 50% 0;
      left:${Math.random()*100}%;
      animation-duration:${10 + Math.random()*14}s;
      animation-delay:${Math.random()*10}s;
      opacity:0;
    `;
    document.body.appendChild(p);
  }

  // Soft confetti burst
  function softBurst(x, y) {
    const cols = ['#f2c4ce','#d9c8e8','#f7ddd0','#e8c8d8','#c9b8e8'];
    for (let i = 0; i < 28; i++) {
      const c = document.createElement('div');
      c.className = 'conf';
      const angle = Math.random() * 360;
      const dist  = 50 + Math.random() * 130;
      const size  = 4 + Math.random() * 8;
      c.style.cssText = `
        left:${x}px; top:${y}px;
        width:${size}px; height:${size}px;
        background:${cols[Math.floor(Math.random()*cols.length)]};
        --tx:${Math.cos(angle*Math.PI/180)*dist}px;
        --ty:${Math.sin(angle*Math.PI/180)*dist}px;
      `;
      document.body.appendChild(c);
      setTimeout(() => c.remove(), 1800);
    }
  }

  function handleForgive() {
    const btn = document.querySelector('.btn');
    const r   = btn.getBoundingClientRect();
    softBurst(r.left + r.width/2, r.top + r.height/2);
    setTimeout(() => {
      document.getElementById('overlay').classList.add('show');
      document.getElementById('popup').classList.add('show');
    }, 250);
  }

  function closePopup() {
    document.getElementById('overlay').classList.remove('show');
    document.getElementById('popup').classList.remove('show');
  }
</script>

</body>
</html>
